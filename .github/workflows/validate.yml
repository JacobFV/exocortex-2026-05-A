name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run generate:head-bridge-config
      - run: git diff --exit-code firmware/esp32-head-bridge/include/bridge_config.h
      - run: npm run validate

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade platformio
      - run: pio run -d firmware/esp32-head-bridge
