[env]
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.2.1
build_flags =
  -D EXOCORTEX_BRIDGE_ID=\"head_serial_bridge\"

[env:esp32dev]
platform = espressif32
board = esp32dev

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
upload_protocol = esptool
build_flags =
  -D EXOCORTEX_BRIDGE_ID=\"head_serial_bridge\"
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D EXOCORTEX_DISABLE_CONFIGURED_IO=1
